version: 2

updates:
  # ── GitHub Actions ──────────────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "ci"

  # ── Rust (workspace) ────────────────────────────────────────────────────────
  # Covers lib/, cli/, and ui/rust/ via the workspace Cargo.toml.
  # The vendored matrix-sdk in vendor/ is ignored — it is a patched local copy
  # managed manually; see docs/decisions/0003-vendored-matrix-sdk.md.
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "chore(deps)"
    ignore:
      # Vendored — updated manually when upstream fixes the recursion-limit bug.
      - dependency-name: matrix-sdk
      # sequoia-openpgp 2.x cannot coexist with openpgp-card-sequoia 0.2.x,
      # which still depends on sequoia-openpgp 1.x and re-exports its types.
      # Re-enable major bumps once openpgp-card-sequoia ships a 2.x release.
      - dependency-name: sequoia-openpgp
        update-types: ["version-update:semver-major"]

  # ── Flutter / Dart ──────────────────────────────────────────────────────────
  - package-ecosystem: pub
    directory: /ui
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "chore(deps)"
