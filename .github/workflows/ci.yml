name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  ci:
    name: build & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libpcsclite-dev

      - name: install Rust toolchain
        # actions-rust-lang/setup-rust-toolchain reads rust-toolchain.toml
        # automatically and installs the pinned version (1.95.0) with the
        # requested components.  dtolnay/rust-toolchain@stable installs a
        # different toolchain version and leaves rustfmt/clippy on the wrong one.
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt, clippy

      - name: cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: fmt
        run: cargo fmt --all -- --check

      - name: clippy
        # rust_lib_p43 is the Flutter bridge crate — built by Flutter, not Rust CI.
        run: >
          cargo clippy
          --workspace --exclude rust_lib_p43
          --all-targets
          -- -D warnings

      - name: build
        run: cargo build --workspace --exclude rust_lib_p43

      - name: test
        run: cargo test --workspace --exclude rust_lib_p43
