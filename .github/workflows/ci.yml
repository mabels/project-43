name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  ci:
    name: build & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libclang-dev \
            llvm \
            nettle-dev \
            libpcsclite-dev

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: fmt
        run: cargo fmt --all -- --check

      - name: clippy
        # rust_lib_p43 (Flutter bridge) uses crypto-rust and is built by Flutter,
        # not Rust CI.  Exclude it to avoid the crypto-nettle vs crypto-rust
        # feature-unification conflict in sequoia-openpgp.
        # Do NOT use --all-features: crypto-nettle and crypto-rust are mutually
        # exclusive and must never be enabled together.
        run: >
          cargo clippy
          --workspace --exclude rust_lib_p43
          --all-targets
          -- -D warnings

      - name: build
        run: cargo build --workspace --exclude rust_lib_p43

      - name: test
        run: cargo test --workspace --exclude rust_lib_p43
