# ── Ingress — OTel Collector (OTLP HTTP) ─────────────────────────────────────
# App endpoint (Rust + Flutter): https://otel.adviser.com/v1/traces
# TLS auto-provisioned by cert-manager letsencrypt-prod (already on this cluster).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: otelcol
  namespace: telemetry
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    # Raise body limit — large span batches can be several hundred KB.
    traefik.ingress.kubernetes.io/router.middlewares: telemetry-otelcol-bodylimit@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
    - hosts: [otel.adviser.com]
      secretName: otelcol-tls
  rules:
    - host: otel.adviser.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: otelcol
                port:
                  number: 4318
---
# Traefik middleware: bump the request body limit for span payloads.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: otelcol-bodylimit
  namespace: telemetry
spec:
  buffering:
    maxRequestBodyBytes: 8388608   # 8 MiB
