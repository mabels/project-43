# OTel Collector configuration.
#
# Pipeline:
#   p43 (Rust / Flutter)
#     → OTLP HTTP  https://otel.adviser.com/v1/traces   (TLS terminated by Traefik)
#     → otelcol :4318
#     → memory_limiter + batch processors
#     → clickhouse exporter
#     → clickhouse.clickhouse.svc.cluster.local:9000
#       database: otel  table: otel_traces
#
# Schema is auto-created by the exporter on first run (create_schema: true).
# Traces are then queryable from Grafana via the ClickHouse datasource.
apiVersion: v1
kind: ConfigMap
metadata:
  name: otelcol-config
  namespace: telemetry
data:
  config.yaml: |
    extensions:
      health_check:
        endpoint: "0.0.0.0:13133"

    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: "0.0.0.0:4317"
          http:
            endpoint: "0.0.0.0:4318"
            cors:
              allowed_origins: ["*"]

    processors:
      memory_limiter:
        check_interval: 5s
        limit_mib: 200
        spike_limit_mib: 50
      batch:
        send_batch_size: 512
        timeout: 5s

    exporters:
      clickhouse:
        # ClickHouse native protocol (port 9000) — faster than HTTP for bulk inserts.
        endpoint: tcp://clickhouse.clickhouse.svc.cluster.local:9000?dial_timeout=10s&compress=lz4
        database: otel
        username: default
        password: ""
        # Auto-create the otel_traces (and otel_logs, otel_metrics) tables.
        create_schema: true
        traces_table_name: otel_traces
        logs_table_name: otel_logs
        metrics_table_name: otel_metrics
        # Keep traces for 30 days; ClickHouse TTL handles the purge.
        ttl: 720h
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 30s
          max_elapsed_time: 300s
        sending_queue:
          enabled: true
          num_consumers: 4
          queue_size: 200

      # Uncomment during bring-up to confirm spans are flowing.
      # debug:
      #   verbosity: basic

    service:
      extensions: [health_check]
      pipelines:
        traces:
          receivers:  [otlp]
          processors: [memory_limiter, batch]
          exporters:  [clickhouse]
