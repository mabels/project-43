[package]
name = "p43"
version = "0.1.0"
edition = "2021"

[dependencies]
anyhow               = "1"
hex                  = "0.4"
sequoia-openpgp      = "1"
openpgp-card-sequoia = "0.2"
card-backend-pcsc    = "0.5"
serde                = { version = "1", features = ["derive"] }
serde_json           = "1"
ssh-key              = { version = "0.6", features = ["alloc", "ed25519"] }

[dev-dependencies]
tempfile = "3"
